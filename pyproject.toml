[project]
name = "project_template"
version = "0.1.0"
description = "Generated by Copier template"

[project.optional-dependencies]
dev = [
    "prek",
    "copier",
]

[tool.setuptools]
package-dir = { "" = "src" }

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["ALL"]
ignore = [
    "COM812",
    "D203",
    "D212",
    "S311",
]

[tool.mypy]
ignore_missing_imports = true
