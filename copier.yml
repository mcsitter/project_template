_schema: 1

project_name:
  type: str
  default: project_template
  help: Name of the generated project

project_slug:
  type: str
  default: "{{ project_name | lower | replace('-', '_') | replace(' ', '_') }}"
  when: false

package_or_app:
  type: str
  default: package
  choices:
    - package
    - app
  help: Generate a Python package or an application (packages use src/ layout)

pre_commit_tool:
  type: str
  default: prek
  choices:
    - prek
    - pre_commit
  help: Pre-commit tool module name

_exclude:
  - .git
  - ^.gitignore$
  - ^.pre-commit-config.yaml$
  - ^src
  - copier.yml
  - ^Makefile$
  - ^pyproject.toml$
  - requirements.txt
