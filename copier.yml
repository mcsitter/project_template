_schema: 1
_subdirectory: template

project_name:
  type: str
  help: What is your {{ project_type }}'s name?
  default: project_template
  placeholder: "{% if project_type == 'app' %}My App{% else %}My Package{% endif %}"
  validator: >-
    {% if not project_name.strip() %}
    Invalid project name
    {% endif %}

project_type:
  type: str
  help: Is this project a package or an app?
  choices:
    - app
    - package
  default: package

project_description:
  type: str
  help: What does your {{ project_type }} do in one sentence?
  default: A Python {{ project_type }} that does things.
  validator: >-
    {% if not project_description.strip() %}
    Invalid project description
    {% endif %}

python_version:
  type: str
  help: "{% if project_type == 'app' %}Which Python version should your app use?{% else %}What is the minimum Python version your package should support?{% endif %}"
  default: "{% if project_type == 'app' %}3.14{% else %}3.12{% endif %}"

pre_commit_tool:
  type: str
  default: prek
  choices:
    - prek
    - pre_commit
  help: Which pre-commit tool do you want to use? (Use prek if you don't know the difference)

with_conventional_commits:
  type: bool
  help: Do you want to follow the Conventional Commits standard (https://www.conventionalcommits.org) for your commit messages?
  default: true

typing:
  type: bool
  default: false
  help: Add `mypy` dev dependency and pre-commit hook

project_name_kebab_case:
  when: false
  default: "{{ project_name | lower | replace(' ', '-') }}"

project_name_snake_case:
  when: false
  default: "{{ project_name | lower | replace(' ', '_') }}"

_exclude:
  - .git
  - ^.gitignore$
  - ^.pre-commit-config.yaml$
  - ^src
  - copier.yml
  - ^Makefile$
  - ^pyproject.toml$
  - requirements.txt
  - "{% if project_type == 'package' %}main.py{% endif %}"
  - "{% if project_type == 'package' %}.python-version{% endif %}"
